<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nothing Here</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --card: #171a21;
      --border: #2a2f3a;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      max-width: 38rem;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
    }
    h1 {
      margin: 0 0 .5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Nothing here.</h1>
    <p>This site is currently empty.</p>
  </main>
</body>
</html>
